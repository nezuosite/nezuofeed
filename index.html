<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEZUO FEED MEDIA FIX</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: #e2e8f0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 10px;
  background: #111827;
  text-align: center;
  font-weight: bold;
}

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column-reverse;
}

.post {
  background: #1f2937;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
}

.title {
  font-weight: bold;
  margin-bottom: 5px;
  color: #60a5fa;
}

.media img {
  max-width: 100%;
  border-radius: 6px;
  margin-top: 5px;
}

footer {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 10px;
  background: #111827;
}

input, textarea {
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
}
button:hover {
  background: #1d4ed8;
}
</style>
</head>

<body>

<header>NEZUO FEED MEDIA FIX</header>

<div id="feed"></div>

<footer>
<input id="title" placeholder="タイトル" />
<textarea id="text" placeholder="本文"></textarea>
<input id="media" placeholder="画像 or YouTube URL（任意）" />
<button onclick="sendPost()">送信</button>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQMt9IbdNAkozbobhnQXy8Xp__C8ApmlM",
  authDomain: "nezuofeed.firebaseapp.com",
  databaseURL: "https://nezuofeed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nezuofeed",
  storageBucket: "nezuofeed.firebasestorage.app",
  messagingSenderId: "518954118208",
  appId: "1:518954118208:web:1c560418c274732c4d83a5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let uid = null;

signInAnonymously(auth)
  .then(res => {
    uid = res.user.uid;
    console.log("UID:", uid);
  })
  .catch(err => {
    uid = "guest-" + Math.random().toString(36).slice(2,10);
    console.warn("Auth失敗:", err.code);
  });

function isYouTube(url) {
  return url.includes("youtube.com") || url.includes("youtu.be");
}

function getYouTubeId(url) {
  const match = url.match(/(youtu\.be\/|v=)([a-zA-Z0-9_-]+)/);
  return match ? match[2] : null;
}

window.sendPost = function () {
  const title = document.getElementById("title").value.trim();
  const text = document.getElementById("text").value.trim();
  const media = document.getElementById("media").value.trim();

  if (!title && !text) return;

  push(ref(db, "posts"), {
    title,
    text,
    media,
    uid: uid || "unknown",
    time: Date.now()
  });

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";
  document.getElementById("media").value = "";
};

const feed = document.getElementById("feed");

onValue(ref(db, "posts"), (snapshot) => {
  feed.innerHTML = "";

  const data = snapshot.val();
  if (!data) return;

  const items = Object.entries(data)
    .sort((a,b) => b[1].time - a[1].time);

  for (const [, v] of items) {
    const div = document.createElement("div");
    div.className = "post";

    const shortUid = (v.uid || "").slice(0,6);

    let html = "";

    if (v.title) {
      html += `<div class="title">${v.title}</div>`;
    }

    if (v.text) {
      html += `<div>${v.text}</div>`;
    }

    if (v.media) {
      if (isYouTube(v.media)) {
        const id = getYouTubeId(v.media);
        if (id) {
          html += `
            <div class="media">
              <iframe width="100%" height="200"
                src="https://www.youtube.com/embed/${id}"
                frameborder="0"
                allowfullscreen></iframe>
            </div>`;
        }
      } else {
        html += `<div class="media"><img src="${v.media}" /></div>`;
      }
    }

    html += `<div style="opacity:0.5;font-size:12px;">${shortUid}</div>`;

    div.innerHTML = html;
    feed.appendChild(div);
  }
});
</script>

</body>
</html>
