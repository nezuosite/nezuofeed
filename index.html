<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEZUO FEED DEBUG FIX</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: #e2e8f0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 10px;
  background: #111827;
  text-align: center;
  font-weight: bold;
}

#status {
  padding: 6px 10px;
  font-size: 12px;
  background: #0b1220;
  color: #93c5fd;
}

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-bottom: 140px;
}

.msg {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 8px;
}

.msg-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.title { font-weight: bold; }
.meta { font-size: 11px; color: #64748b; }

#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111827;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input, textarea {
  width: 100%;
  border: none;
  border-radius: 8px;
  padding: 10px;
  background: #0f172a;
  color: #e2e8f0;
}

button {
  padding: 10px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>NEZUO FEED DEBUG FIX</header>

<div id="status">起動中...</div>
<div id="feed"></div>

<div id="inputArea">
  <input id="title" placeholder="タイトル" />
  <textarea id="text" placeholder="メッセージ"></textarea>
  <button id="sendBtn">投稿</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ---------------------------
   Firebase設定
----------------------------*/
const firebaseConfig = {
  apiKey: "AIzaSyDQMt9IbdNAkozbobhnXQy8X8p__C8ApmlM",
  authDomain: "nezuofeed.firebaseapp.com",
  databaseURL: "https://nezuofeed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nezuofeed",
  storageBucket: "nezuofeed.firebasestorage.app",
  messagingSenderId: "518954118208",
  appId: "1:518954118208:web:1c560418c274732c4d83a5"
};

/* ---------------------------
   初期化
----------------------------*/
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const chatRef = ref(db, "chat/messages");

let uid = null;

/* ---------------------------
   状態表示
----------------------------*/
const status = document.getElementById("status");

/* ---------------------------
   匿名認証
----------------------------*/
signInAnonymously(auth)
  .then(() => {
    status.textContent = "匿名認証リクエスト成功";
  })
  .catch((e) => {
    console.error(e);
    status.textContent = "認証エラー: " + e.code;
  });

onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    status.textContent = "UID: " + uid;
    localStorage.setItem("uid_cache", uid);
  } else {
    status.textContent = "未ログイン";
  }
});

/* ---------------------------
   投稿表示
----------------------------*/
onValue(chatRef, (snap) => {
  const data = snap.val();
  const feed = document.getElementById("feed");

  feed.innerHTML = "";

  if (!data) return;

  Object.entries(data)
    .sort((a, b) => b[1].time - a[1].time)
    .forEach(([id, m]) => {

      const div = document.createElement("div");
      div.className = "msg";

      const isMine = m.uid === uid;

      div.innerHTML = `
        <div class="msg-header">
          <div>
            <div class="title">${m.title || "無題"}</div>
            <div class="meta">${m.uid || "unknown"}</div>
          </div>

          ${isMine ? `<button onclick="delMsg('${id}')">削除</button>` : ""}
        </div>
        <div>${m.text}</div>
      `;

      feed.appendChild(div);
    });
});

/* ---------------------------
   投稿
----------------------------*/
document.getElementById("sendBtn").onclick = () => {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!text) return;

  if (!uid) {
    alert("認証待ちです");
    return;
  }

  push(chatRef, {
    title,
    text,
    uid,
    time: Date.now()
  });

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";
};

/* ---------------------------
   削除
----------------------------*/
window.delMsg = (id) => {
  remove(ref(db, "chat/messages/" + id));
};

</script>

</body>
</html>
