<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEZUO FEED FINAL</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: #e2e8f0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 10px;
  background: #111827;
  text-align: center;
  font-weight: bold;
}

#status {
  padding: 6px 10px;
  font-size: 12px;
  background: #0b1220;
  color: #93c5fd;
}

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-bottom: 160px;
}

.msg {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 10px;
}

.msg-header {
  padding: 8px;
  display: flex;
  justify-content: space-between;
  background: #0f172a;
}

.title { font-weight: bold; }
.meta { font-size: 11px; color: #64748b; }

.msg-body {
  padding: 8px;
  display: none;
  white-space: pre-wrap;
}

.msg.open .msg-body {
  display: block;
}

.delBtn {
  background: #dc2626;
  border: none;
  color: white;
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
}

#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111827;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid #1f2937;
}

input, textarea {
  width: 100%;
  border: none;
  border-radius: 8px;
  padding: 10px;
  background: #0f172a;
  color: #e2e8f0;
  font-size: 14px;
  outline: none;
}

button {
  padding: 12px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>NEZUO FEED FINAL</header>

<div id="status">接続中...</div>
<div id="feed"></div>

<div id="inputArea">
  <input id="title" placeholder="タイトル" />
  <textarea id="text" placeholder="メッセージ入力"></textarea>
  <button onclick="send()">投稿</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ================= Firebase ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDQMt9IbdNAkozbobhnXy8Xp__C8ApmlM",
  authDomain: "nezuofeed.firebaseapp.com",
  databaseURL: "https://nezuofeed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nezuofeed",
  storageBucket: "nezuofeed.firebasestorage.app",
  messagingSenderId: "518954118208",
  appId: "1:518954118208:web:1c560418c274732c4d83a5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const chatRef = ref(db, "chat/messages");

/* ================= AUTH（匿名は維持） ================= */
let authUid = null;

signInAnonymously(auth);

onAuthStateChanged(auth, (user) => {
  if (!user) return;
  authUid = user.uid;

  document.getElementById("status").textContent =
    "UID: " + authUid;
});

/* ================= PUBLIC ID ================= */
let publicId = localStorage.getItem("publicId");

if (!publicId) {
  publicId = "NEZUO-" + Math.random().toString(36).substring(2, 8).toUpperCase();
  localStorage.setItem("publicId", publicId);
}

/* ================= RENDER ================= */
const feed = document.getElementById("feed");

function render(data){
  feed.innerHTML = "";

  const arr = Object.entries(data || {})
    .sort((a,b)=>b[1].time - a[1].time);

  arr.forEach(([id,m])=>{
    const div = document.createElement("div");
    div.className = "msg";
    div.classList.toggle("open", !m.collapsed);

    const canDelete = m.authUid === authUid;

    div.innerHTML = `
      <div class="msg-header">
        <div>
          <div class="title">${m.title || "無題"}</div>
          <div class="meta">
            ${m.publicId} • ${new Date(m.time).toLocaleString()}
          </div>
        </div>

        ${canDelete ? `<button class="delBtn" onclick="del('${id}')">削除</button>` : ""}
      </div>

      <div class="msg-body">${m.text || ""}</div>
    `;

    feed.appendChild(div);
  });
}

onValue(chatRef, (snap)=>{
  render(snap.val());
});

/* ================= SEND（誰でもOK） ================= */
window.send = () => {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!text) return;

  push(chatRef, {
    title: title || "無題",
    text,
    time: Date.now(),
    authUid,      // 削除判定用
    publicId,
    collapsed: true
  });

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";
};

/* ================= DELETE（自分のみ） ================= */
window.del = (id) => {
  remove(ref(db, `chat/messages/${id}`));
};

</script>

</body>
</html>
