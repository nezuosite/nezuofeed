<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEZUO FEED STABLE</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: #e2e8f0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  padding: 10px;
  background: #111827;
  text-align: center;
  font-weight: bold;
}

#uidBar {
  padding: 6px 10px;
  font-size: 12px;
  background: #0b1220;
  color: #93c5fd;
}

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-bottom: 160px;
}

.msg {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 10px;
}

.msg-header {
  padding: 8px;
  display: flex;
  justify-content: space-between;
  background: #0f172a;
  cursor: pointer;
}

.title { font-weight: bold; }

.meta {
  font-size: 11px;
  color: #64748b;
}

.msg-body {
  padding: 8px;
  display: none;
  white-space: pre-wrap;
}

.msg.open .msg-body {
  display: block;
}

#inputArea {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111827;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid #1f2937;
}

input, textarea {
  width: 100%;
  border: none;
  border-radius: 8px;
  padding: 10px;
  background: #0f172a;
  color: #e2e8f0;
  font-size: 14px;
  outline: none;
}

button {
  padding: 12px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 8px;
}

#copyBtn {
  position: fixed;
  top: 60px;
  right: 10px;
  background: #10b981;
  border: none;
  color: white;
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>NEZUO FEED STABLE</header>

<div id="uidBar">UID: loading...</div>
<button id="copyBtn" onclick="copyUID()">UIDコピー</button>

<div id="feed"></div>

<div id="inputArea">
  <input id="title" placeholder="タイトル" />
  <textarea id="text" placeholder="メッセージ入力"></textarea>
  <button onclick="send()">投稿</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  update
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ================= Firebase ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDQMt9IbdNAkozbobhnXQ8Xp__C8ApmlM",
  authDomain: "nezuofeed.firebaseapp.com",
  databaseURL: "https://nezuofeed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nezuofeed",
  storageBucket: "nezuofeed.firebasestorage.app",
  messagingSenderId: "518954118208",
  appId: "1:518954118208:web:1c560418c274732c4d83a5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat/messages");

/* ================= UID（完全安定版） ================= */
function getUID() {
  try {
    let uid =
      localStorage.getItem("uid") ||
      sessionStorage.getItem("uid");

    if (!uid) {
      uid =
        crypto.randomUUID() +
        "-" +
        Math.random().toString(36).slice(2);

      localStorage.setItem("uid", uid);
      sessionStorage.setItem("uid", uid);
    }

    return uid;
  } catch (e) {
    return "guest-" + Math.random().toString(36).slice(2);
  }
}

/* ================= UID表示 ================= */
function showUID() {
  document.getElementById("uidBar").textContent =
    "UID: " + getUID();
}
showUID();

/* ================= COPY UID ================= */
window.copyUID = () => {
  navigator.clipboard.writeText(getUID());
  alert("UIDコピーしました");
};

/* ================= RENDER ================= */
const feed = document.getElementById("feed");

function render(data){
  feed.innerHTML = "";

  const arr = Object.entries(data || {})
    .sort((a,b)=>b[1].time - a[1].time);

  arr.forEach(([id,m])=>{
    const div = document.createElement("div");
    div.className = "msg";
    div.classList.toggle("open", !m.collapsed);

    const uid = m.uid || "unknown";

    div.innerHTML = `
      <div class="msg-header" onclick="toggle('${id}', ${m.collapsed})">
        <div>
          <div class="title">${m.title || "無題"}</div>
          <div class="meta">${uid} • ${new Date(m.time).toLocaleString()}</div>
        </div>
      </div>

      <div class="msg-body">${m.text || ""}</div>
    `;

    feed.appendChild(div);
  });
}

onValue(chatRef, (snap)=>{
  try {
    render(snap.val());
  } catch (e) {
    console.error("render error:", e);
  }
});

/* ================= SEND（全員OK） ================= */
window.send = () => {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  if (!text) return;

  const uid = getUID();

  push(chatRef, {
    title: title || "無題",
    text: text,
    uid: uid,
    time: Date.now(),
    collapsed: true
  });

  document.getElementById("title").value = "";
  document.getElementById("text").value = "";
};

/* ================= TOGGLE ================= */
window.toggle = (id,current)=>{
  update(ref(db, `chat/messages/${id}`), {
    collapsed: !current
  });
};
</script>

</body>
</html>
